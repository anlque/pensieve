<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#02080d" />
    <title>Омут памяти</title>
  </head>
  <body>
    <main id="app" class="app-shell">
      <section class="app-stage" aria-labelledby="app-title">
        <button class="icon-button info-button" type="button" aria-label="Информация">
          i
        </button>

        <button
          class="icon-button tune-button"
          type="button"
          aria-label="Настройки фона"
          aria-expanded="false"
          aria-controls="wallpaper-menu"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>

        <div id="wallpaper-menu" class="wallpaper-menu" aria-hidden="true">
          <p class="wallpaper-menu-title">Обои</p>
          <button class="wallpaper-option" type="button" data-wallpaper-option="forest">
            <span class="wallpaper-swatch wallpaper-swatch-forest"></span>
            <span>Лес</span>
          </button>
          <button class="wallpaper-option" type="button" data-wallpaper-option="moon">
            <span class="wallpaper-swatch wallpaper-swatch-moon"></span>
            <span>Луна</span>
          </button>
          <button class="wallpaper-option" type="button" data-wallpaper-option="deep">
            <span class="wallpaper-swatch wallpaper-swatch-deep"></span>
            <span>Глубина</span>
          </button>
          <button class="wallpaper-option" type="button" data-wallpaper-option="embers">
            <span class="wallpaper-swatch wallpaper-swatch-embers"></span>
            <span>Искры</span>
          </button>
        </div>

        <div class="forest-depth" aria-hidden="true"></div>
        <div class="star-field" aria-hidden="true"></div>

        <div class="screen screen-home" data-screen="home">
          <header class="hero-copy">
            <h1 id="app-title">Омут<br />памяти</h1>
            <p>Твои мысли важны.<br />Выгрузи их. Отпусти.</p>
          </header>
        </div>

        <div class="screen screen-capture" data-screen="capture" aria-hidden="true">
          <button class="back-button" type="button" aria-label="Назад">
            ‹
          </button>

          <form class="thought-form" autocomplete="off">
            <label class="sr-only" for="thought-input">Мысль</label>
            <input
              id="thought-input"
              class="thought-input"
              name="thought"
              type="text"
              placeholder="Вытащи мысль..."
              maxlength="80"
            />
            <button class="thought-submit" type="submit" aria-label="Поймать мысль">
              <span></span>
            </button>
          </form>

          <button class="let-go-button" type="button" hidden>
            Отпустить мысли
          </button>

          <button class="mix-button" type="button" hidden>
            Перемешать
          </button>

          <button class="mix-close-button" type="button" aria-label="Закрыть омут">
            ×
          </button>

          <div class="wand-hand" aria-hidden="true">
            <img class="hand-asset" src="/src/assets/hand-wand.png" alt="" />
            <span class="wand-light"></span>
          </div>

          <div class="thought-cloud" aria-live="polite">
            <span class="thought-cloud-text">Нужно позвонить маме</span>
          </div>
          <div class="thought-stream" aria-hidden="true"></div>
          <div class="release-trail" aria-hidden="true"></div>
        </div>

        <div class="pensieve-scene" aria-hidden="true">
          <div class="bowl-rim"></div>
          <div class="water-surface">
            <div class="pensieve-thoughts" aria-hidden="true"></div>
            <span class="stir-glow"></span>
            <span class="ripple ripple-one"></span>
            <span class="ripple ripple-two"></span>
            <span class="ripple ripple-three"></span>
            <span class="glow-dot dot-one"></span>
            <span class="glow-dot dot-two"></span>
            <span class="glow-dot dot-three"></span>
            <span class="glow-dot dot-four"></span>
            <span class="release-splash"></span>
          </div>
          <div class="bowl-front"></div>
          <div class="stir-zone" aria-hidden="true"></div>
        </div>

        <div class="thought-modal" role="dialog" aria-modal="true" aria-hidden="true">
          <button class="thought-modal-close" type="button" aria-label="Закрыть мысль">
            ×
          </button>
          <p class="thought-modal-text"></p>
        </div>

        <div class="primary-action">
          <button class="wand-button" type="button" aria-label="Взять мысль палочкой">
            <span class="wand-icon"></span>
          </button>
          <p>Коснись и начни<br />выгружать мысли</p>
        </div>

      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
